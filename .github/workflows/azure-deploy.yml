# =============================================================================
# .github/workflows/azure-deploy.yml
# Pipeline CI/CD para Consultorio Dental
#
# FASE CI (Integración Continua):
#   - Trigger: Pull Request hacia 'main'
#   - Levanta Python 3.12, instala dependencias, ejecuta tests
#   - Si un test falla → BLOQUEA el merge automáticamente
#
# FASE CD (Despliegue Continuo):
#   - Trigger: Merge exitoso a 'main'
#   - Despliega en Azure App Service (plan F1 gratuito)
# =============================================================================

name: "CI/CD — Consultorio Dental → Azure App Service"

on:
  pull_request:
    branches: [ main ]        # CI: se activa en PR hacia main
  push:
    branches: [ main ]        # CD: se activa tras merge exitoso en main

# Evita despliegues paralelos simultáneos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}   # Nombre del App Service en Azure

# =============================================================================
# JOB 1: CI — INTEGRACIÓN CONTINUA (Pull Requests)
# =============================================================================
jobs:
  ci-test:
    name: "🧪 CI — Pruebas Unitarias"
    runs-on: ubuntu-latest
    # Solo se ejecuta en Pull Requests
    if: github.event_name == 'pull_request'

    env:
      # Variables de entorno mínimas para que Django arranque en CI
      SECRET_KEY: "ci-secret-key-insegura-solo-para-tests-${{ github.sha }}"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      # DB_HOSTNAME vacío → Django usará SQLite automáticamente (ver settings.py)
      DB_HOSTNAME: ""

    steps:
      - name: "📥 Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🗃️ Verificar y aplicar migraciones de prueba"
        run: |
          python manage.py migrate --noinput --settings=config.settings

      - name: "🧪 Ejecutar suite de pruebas unitarias"
        run: |
          python manage.py test apps.citas --verbosity=2 --settings=config.settings
        # Si algún test falla, GitHub Actions bloqueará automáticamente el merge

      - name: "📊 Verificar linting básico (sin errores de sintaxis)"
        run: |
          python -m py_compile config/settings.py
          python -m py_compile apps/usuarios/models.py
          python -m py_compile apps/citas/models.py
          python -m py_compile apps/agenda/models.py
          python -m py_compile apps/fichas/models.py
          echo "✅ Verificación de sintaxis completada sin errores."

# =============================================================================
# JOB 2: CD — DESPLIEGUE CONTINUO (Push a main tras merge)
# =============================================================================
  cd-deploy:
    name: "🚀 CD — Despliegue en Azure App Service"
    runs-on: ubuntu-latest
    # Solo se ejecuta en push directo a main (después del merge del PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: "📥 Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Instalar dependencias de producción"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "📁 Crear estructura de directorios necesarios"
        run: |
          mkdir -p media/comprobantes
          mkdir -p staticfiles
          # Crear archivo .gitkeep para que los directorios se incluyan
          touch media/comprobantes/.gitkeep
          touch staticfiles/.gitkeep

      - name: "📦 Crear paquete de despliegue (.zip)"
        run: |
          zip -r deploy.zip . \
            --exclude="*.git*" \
            --exclude="*__pycache__*" \
            --exclude="*.pyc" \
            --exclude="db.sqlite3" \
            --exclude="*.env" \
            --exclude=".env*"

      - name: "☁️ Autenticación en Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # AZURE_CREDENTIALS debe ser un JSON de Service Principal con formato:
          # {
          #   "clientId":       "...",
          #   "clientSecret":   "...",
          #   "subscriptionId": "...",
          #   "tenantId":       "..."
          # }

      - name: "🚀 Desplegar en Azure App Service"
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy.zip
          # startup-command se configura en Azure Portal → Startup Command:
          # bash startup.sh

      - name: "✅ Verificar despliegue (health check)"
        run: |
          echo "Esperando que el servicio arranque..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/auth/login/")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check falló con status $STATUS"
            exit 1
          fi
          echo "✅ Despliegue verificado correctamente."

      - name: "🔔 Notificar resultado del despliegue"
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Despliegue exitoso en https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          else
            echo "❌ Despliegue fallido. Revisar logs en Azure Portal."
          fi
